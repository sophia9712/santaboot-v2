<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — SantaBoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; line-height: 1.5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .register-container { max-width: 420px; width: 90%; margin: 2rem auto; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo a { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        
        .register-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 2rem; }
        .register-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
        .register-card p { color: #a0a0a0; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #4f46e5; }
        
        .btn-register { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .btn-register:hover { transform: translateY(-2px); }
        
        .login-link { text-align: center; margin-top: 1.5rem; color: #a0a0a0; font-size: 0.9rem; }
        .login-link a { color: #4f46e5; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; color: #ef4444; font-size: 0.9rem; text-align: center; display: none; }
        .success-message { background: rgba(16,185,129,0.1); border: 1px solid #10b981; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; color: #10b981; font-size: 0.9rem; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <a href="/">SantaBoot</a>
        </div>
        <div class="register-card">
            <h1>Crear cuenta</h1>
            <p>Regístrate gratis y empieza a controlar tu PC con voz</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>Código VIP (opcional)</label>
                    <input type="text" id="vipCode" placeholder="Ej: SANTACRUZVIP">
                </div>
                <button type="submit" class="btn-register">Registrarse</button>
            </form>
            
            <div class="login-link">
                ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const vipCode = document.getElementById('vipCode').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, vipCode })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successDiv.textContent = data.message || 'Registro exitoso. Redirigiendo al login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'Error al registrarse';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
