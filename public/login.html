<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — SantaBoot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Inter', system-ui, sans-serif; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  padding: 1rem; 
}
.login-card { 
  background: white; 
  border-radius: 20px; 
  padding: 2rem; 
  width: 100%; 
  max-width: 400px; 
  box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
}
.logo { text-align: center; margin-bottom: 1.5rem; }
.logo-text { 
  font-size: 1.75rem; 
  font-weight: 800; 
  background: linear-gradient(135deg, #667eea, #764ba2); 
  -webkit-background-clip: text; 
  color: transparent; 
}
.form-group { margin-bottom: 1rem; }
label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.875rem; color: #1a1a2e; }
input { 
  width: 100%; 
  padding: 0.75rem; 
  border: 1px solid #e2e8f0; 
  border-radius: 10px; 
  font-size: 0.9rem; 
}
input:focus { 
  outline: none; 
  border-color: #667eea; 
  box-shadow: 0 0 0 3px rgba(102,126,234,0.2); 
}
.btn-primary { 
  width: 100%; 
  background: linear-gradient(135deg, #667eea, #764ba2); 
  color: white; 
  padding: 0.75rem; 
  border: none; 
  border-radius: 10px; 
  font-weight: 600; 
  cursor: pointer; 
  font-size: 1rem; 
  margin-top: 0.5rem; 
}
.btn-primary:hover { opacity: 0.95; }
.error-message { 
  background: #fee2e2; 
  color: #ef4444; 
  padding: 0.75rem; 
  border-radius: 10px; 
  margin-bottom: 1rem; 
  display: none; 
  font-size: 0.875rem; 
}
.switch-link { 
  text-align: center; 
  margin-top: 1.5rem; 
  font-size: 0.875rem; 
  color: #6b7280; 
}
.switch-link a { 
  color: #667eea; 
  text-decoration: none; 
  font-weight: 500; 
}
.switch-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo"><div class="logo-text">SantaBoot</div></div>
  <div id="errorMessage" class="error-message"></div>
  <form id="loginForm">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" required placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-primary">Iniciar Sesión</button>
  </form>
  <div class="switch-link">
    ¿No tienes cuenta? <a href="/register.html">Regístrate aquí</a>
  </div>
</div>

<script>
// ============================================================================
// DETECTAR PARÁMETROS OAUTH AL CARGAR LA PÁGINA
// ============================================================================
let oauthCode = null;
let oauthState = null;

document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  oauthCode = params.get('code');
  oauthState = params.get('state');
  
  console.log('🔐 Login cargado', { 
    hasCode: !!oauthCode, 
    hasState: !!oauthState 
  });
  
  if (oauthCode && oauthState) {
    console.log('✅ Código OAuth detectado, listo para completar tras login');
  }
});

// ============================================================================
// HANDLER DE LOGIN CON SOPORTE OAUTH
// ============================================================================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMessage');
  
  console.log('🔑 Iniciando login...', email);
  
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    console.log('📥 Respuesta:', res.status, data);
    
    if (res.ok) {
      // Guardar sesión
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      
      console.log('✅ Login exitoso. User ID:', data.user?.id);
      
      // VERIFICAR SI HAY OAuth PENDIENTE
      if (oauthCode && oauthState && data.user?.id) {
        console.log(' Completando OAuth flow...');
        
        // Redirigir al callback de Alexa
        const callbackUrl = `/auth/authorize/callback?code=${oauthCode}&state=${oauthState}&userId=${data.user.id}`;
        console.log(' Redirigiendo a:', callbackUrl);
        
        window.location.href = callbackUrl;
      } else {
        console.log('📊 Sin OAuth, yendo a dashboard');
        window.location.href = '/dashboard.html';
      }
    } else {
      errorEl.textContent = data.error || 'Error al iniciar sesión';
      errorEl.style.display = 'block';
      setTimeout(() => errorEl.style.display = 'none', 4000);
    }
  } catch (err) {
    console.error('❌ Error:', err);
    errorEl.textContent = 'Error de conexión';
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 4000);
  }
});
</script>
</body>
</html>
