<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SantaBoot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { background: white; border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
    .logo { text-align: center; font-size: 1.75rem; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; color: transparent; margin-bottom: 0.5rem; }
    h1 { text-align: center; font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { text-align: center; color: #6b7280; margin-bottom: 2rem; font-size: 0.9rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input { width: 100%; padding: 0.875rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; }
    input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
    .btn-login { width: 100%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 0.875rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .register-link { text-align: center; margin-top: 1.5rem; color: #6b7280; }
    .register-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    .back-home { text-align: center; margin-top: 1rem; }
    .back-home a { color: #9ca3af; text-decoration: none; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">SantaBoot</div>
    <h1>Bienvenido de vuelta</h1>
    <div class="subtitle">Ingresa tus datos para continuar</div>
    <form id="loginForm">
      <div class="form-group"><label>Correo electrónico</label><input type="email" id="email" placeholder="tu@email.com" required></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>
    <div class="register-link">¿No tienes cuenta? <a href="/register.html">Regístrate gratis</a></div>
    <div class="back-home"><a href="/">← Volver al inicio</a></div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }) });
        const data = await res.json();
        if (res.ok) { localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); alert('✅ Inicio de sesión exitoso'); window.location.href = '/dashboard.html'; }
        else alert('❌ Error: ' + data.error);
      } catch { alert('❌ Error al conectar'); }
    });
  </script>
</body>
</html>
