<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SantaBoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0f1c; color: #f1f5f9; line-height: 1.5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .login-container { max-width: 400px; width: 90%; margin: 2rem auto; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo a { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        
        .login-card { background: rgba(255,255,255,0.02); border: 1px solid #1e293b; border-radius: 24px; padding: 2rem; }
        .login-card h1 { font-size: 1.5rem; margin-bottom: 0.5rem; text-align: center; }
        .login-card p { color: #94a3b8; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid #1e293b; border-radius: 12px; color: white; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #4f46e5; }
        
        .btn-login { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .btn-login:hover { transform: translateY(-2px); }
        
        .register-link { text-align: center; margin-top: 1.5rem; color: #94a3b8; font-size: 0.9rem; }
        .register-link a { color: #4f46e5; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 12px; padding: 0.8rem; margin-bottom: 1rem; color: #ef4444; font-size: 0.9rem; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <a href="/">SantaBoot</a>
        </div>
        <div class="login-card">
            <h1>Iniciar sesión</h1>
            <p>Accede a tu cuenta de SantaBoot</p>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión</button>
            </form>
            
            <div class="register-link">
                ¿No tienes cuenta? <a href="/register.html">Regístrate gratis</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Error al iniciar sesión';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
