<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi panel — SantaBoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; line-height: 1.5; }
        
        .header { padding: 1rem 2rem; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-email { color: #a0a0a0; }
        .btn-logout { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; padding: 0.5rem 1rem; border-radius: 30px; color: #ef4444; cursor: pointer; transition: all 0.3s; }
        .btn-logout:hover { background: rgba(239,68,68,0.4); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .plan-badge { display: inline-block; padding: 0.25rem 1rem; border-radius: 20px; font-size: 0.8rem; margin-bottom: 1rem; }
        .plan-free { background: rgba(100,100,100,0.2); color: #a0a0a0; }
        .plan-premium { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; }
        .upgrade-btn { background: linear-gradient(135deg, #f59e0b, #d97706); border: none; padding: 0.25rem 0.75rem; border-radius: 20px; color: white; cursor: pointer; margin-left: 1rem; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; }
        .card h2 { font-size: 1.3rem; margin-bottom: 1rem; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; }
        input:focus { outline: none; border-color: #4f46e5; }
        
        .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 0.8rem 1.5rem; border: none; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); }
        
        .device-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .device-info h3 { margin-bottom: 0.25rem; }
        .device-info p { color: #a0a0a0; font-size: 0.8rem; }
        .btn-delete { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; padding: 0.5rem 1rem; border-radius: 30px; color: #ef4444; cursor: pointer; }
        
        .alexa-status { margin: 0.5rem 0; }
        .alexa-status.linked { color: #10b981; }
        .alexa-status.unlinked { color: #ef4444; }
        
        .error-message, .success-message { padding: 0.75rem; border-radius: 12px; margin-bottom: 1rem; display: none; }
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
        .success-message { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; }
        
        .loading { text-align: center; color: #a0a0a0; padding: 2rem; }
        .empty-message { text-align: center; color: #a0a0a0; padding: 2rem; }
        
        @media (max-width: 768px) { .container { padding: 1rem; } .device-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">SantaBoot</a>
        <div class="user-info">
            <span class="user-email" id="userEmail">cargando...</span>
            <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
        </div>
    </header>
    
    <div class="container">
        <div id="planInfo"></div>
        
        <div class="card">
            <h2><i class="fab fa-amazon"></i> Vincular con Alexa</h2>
            <p class="alexa-status unlinked" id="alexaStatus">Estado: No vinculado</p>
            <button id="linkAlexaBtn" class="btn-primary" onclick="startAlexaLink()">Vincular cuenta</button>
            <button id="unlinkAlexaBtn" class="btn-delete" onclick="unlinkAlexa()" style="display:none;">Desvincular</button>
            <p style="font-size:0.8rem; color:#666; margin-top:0.5rem;">Al vincular, Alexa podrá encender tus PCs automáticamente.</p>
        </div>
        
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Agregar nuevo PC</h2>
            <div id="addErrorMessage" class="error-message"></div>
            <div id="addSuccessMessage" class="success-message"></div>
            <div class="form-group"><label>Nombre del PC</label><input type="text" id="deviceName" placeholder="Ej: Mi PC Gamer"></div>
            <div class="form-group"><label>Dirección MAC</label><input type="text" id="macAddress" placeholder="Ej: 00:1A:2B:3C:4D:5E"></div>
            <div class="form-group"><label>Dirección IP (opcional)</label><input type="text" id="ipAddress" placeholder="Ej: 192.168.1.100"></div>
            <button class="btn-primary" id="addDeviceBtn">Agregar PC</button>
        </div>
        
        <div class="card">
            <h2><i class="fas fa-desktop"></i> Mis PCs</h2>
            <div id="devicesContainer"><div class="loading">Cargando tus PCs...</div></div>
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) window.location.href = '/login.html';
        document.getElementById('userEmail').textContent = user.email || 'usuario';
        
        async function loadUserPlan() {
            try {
                const res = await fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return;
                const data = await res.json();
                const planInfo = document.getElementById('planInfo');
                if (data.plan === 'premium') {
                    planInfo.innerHTML = `<div class="plan-badge plan-premium">⭐ PLAN PREMIUM - PCs ilimitados</div>`;
                } else {
                    planInfo.innerHTML = `<div class="plan-badge plan-free">📦 PLAN GRATIS - 1 PC máximo <button class="upgrade-btn" id="upgradeBtn">Actualizar a Premium ($9.99/mes)</button></div>`;
                    document.getElementById('upgradeBtn')?.addEventListener('click', async () => {
                        try {
                            const res = await fetch('/payments/create-checkout-session', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ user_id: user.id, email: user.email }) });
                            const data = await res.json();
                            if (data.url) window.location.href = data.url;
                            else alert('Error: ' + data.error);
                        } catch { alert('Error de conexión'); }
                    });
                }
            } catch (e) { console.error(e); }
        }
        
        async function loadDevices() {
            const container = document.getElementById('devicesContainer');
            try {
                const res = await fetch(`/devices/${user.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error();
                const devices = await res.json();
                container.innerHTML = '';
                if (!devices.length) { container.innerHTML = '<div class="empty-message">No tienes PCs. Agrega uno arriba.</div>'; return; }
                devices.forEach(d => {
                    const card = document.createElement('div'); card.className = 'device-card';
                    card.innerHTML = `<div class="device-info"><h3><i class="fas fa-microchip"></i> ${d.name}</h3><p>MAC: ${d.mac_address}</p>${d.ip_address ? `<p>IP: ${d.ip_address}</p>` : ''}</div><button class="btn-delete" data-id="${d.id}">Eliminar</button>`;
                    container.appendChild(card);
                });
                document.querySelectorAll('.btn-delete').forEach(btn => btn.onclick = async () => { if (confirm('¿Eliminar este PC?')) { await fetch(`/devices/${btn.dataset.id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); loadDevices(); } });
            } catch { container.innerHTML = '<div class="error-message" style="display:block">Error al cargar</div>'; }
        }
        
        async function addDevice() {
            const name = document.getElementById('deviceName').value.trim();
            const mac = document.getElementById('macAddress').value.trim();
            const ip = document.getElementById('ipAddress').value.trim();
            if (!name || !mac) return showError('Nombre y MAC son obligatorios');
            hideMessages();
            try {
                const res = await fetch('/devices/add', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ user_id: user.id, name, mac_address: mac, ip_address: ip || null }) });
                const data = await res.json();
                if (res.ok) { showSuccess('PC agregado'); document.getElementById('deviceName').value = ''; document.getElementById('macAddress').value = ''; document.getElementById('ipAddress').value = ''; loadDevices(); loadUserPlan(); }
                else showError(data.error);
            } catch { showError('Error de conexión'); }
        }
        
        function showError(m) { const e = document.getElementById('addErrorMessage'); e.textContent = m; e.style.display = 'block'; setTimeout(()=>e.style.display='none', 4000); }
        function showSuccess(m) { const e = document.getElementById('addSuccessMessage'); e.textContent = m; e.style.display = 'block'; setTimeout(()=>e.style.display='none', 3000); }
        function hideMessages() { document.getElementById('addErrorMessage').style.display = 'none'; document.getElementById('addSuccessMessage').style.display = 'none'; }
        
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = '/'; };
        document.getElementById('addDeviceBtn').onclick = addDevice;
        
        function startAlexaLink() {
            const clientId = 'santaboot-alexa-client';
            const redirectUri = `${window.location.origin}/auth/authorize/callback`;
            const state = crypto.randomUUID();
            sessionStorage.setItem('alexa_link_state', state);
            const authUrl = `https://pitangui.amazon.com/api/skill/link/M20X07RJHC3DO9?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirectUri)}&state=${encodeURIComponent(state)}&response_type=code`;
            window.location.href = authUrl;
        }
        
        async function unlinkAlexa() {
            if (!confirm('¿Desvincular Alexa? Deberás volver a iniciar sesión.')) return;
            try {
                const res = await fetch('/auth/unlink-alexa', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) { alert('Desvinculado'); checkAlexaStatus(); }
            } catch { alert('Error'); }
        }
        
        async function checkAlexaStatus() {
            try {
                const res = await fetch('/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return;
                const data = await res.json();
                const statusEl = document.getElementById('alexaStatus');
                const linkBtn = document.getElementById('linkAlexaBtn');
                const unlinkBtn = document.getElementById('unlinkAlexaBtn');
                if (data.alexa_linked) {
                    statusEl.textContent = '✅ Vinculado correctamente';
                    statusEl.className = 'alexa-status linked';
                    linkBtn.style.display = 'none';
                    unlinkBtn.style.display = 'inline-block';
                } else {
                    statusEl.textContent = '❌ No vinculado';
                    statusEl.className = 'alexa-status unlinked';
                    linkBtn.style.display = 'inline-block';
                    unlinkBtn.style.display = 'none';
                }
            } catch { console.error('Error'); }
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('code') && urlParams.get('state') === sessionStorage.getItem('alexa_link_state')) {
            alert('✅ ¡Cuenta vinculada! Ahora di "Alexa, abre SantaBoot"');
            sessionStorage.removeItem('alexa_link_state');
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        document.addEventListener('DOMContentLoaded', () => { loadUserPlan(); loadDevices(); checkAlexaStatus(); });
    </script>
</body>
</html>
